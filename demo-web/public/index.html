<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#e9e3d5">
  <title>纸间 · 手写日记</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand"><span class="brand-mark">✦</span><div><h1>纸间</h1><p>写下它，然后交给纸张</p></div></div>
      <button class="text-button" id="memoryButton" type="button" aria-controls="memoryPanel" aria-expanded="false">记忆 <span id="memoryCount">0</span></button>
    </header>
    <section class="paper-frame" aria-label="手写白板">
      <canvas id="paperCanvas"></canvas>
      <div class="paper-hint" id="paperHint">用鼠标、手指或 Apple Pencil 写下内容</div>
      <section class="answer-card" id="answerCard" hidden aria-live="polite">
        <p class="answer-label">纸上的回音</p><blockquote id="answerText"></blockquote>
        <p class="transcript" id="transcriptText"></p>
      </section>
      <section class="sending-card" id="sendingCard" hidden aria-live="polite"><span class="ink-dot"></span><p>纸张正在阅读……</p></section>
    </section>
    <footer class="toolbar">
      <div class="status" id="statusText">准备书写</div>
      <div class="actions"><button class="secondary-button" id="clearButton" type="button" disabled>清空</button></div>
    </footer>
  </main>
  <aside class="memory-panel" id="memoryPanel" aria-hidden="true">
    <div class="memory-header"><div><p class="eyebrow">LOCAL MEMORY</p><h2>日记记得的事</h2></div><button class="close-button" id="closeMemoryButton" type="button" aria-label="关闭记忆">×</button></div>
    <div class="memory-list" id="memoryList"></div>
  </aside>
  <div class="scrim" id="scrim" hidden></div>
  <script src="supabase-config.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
