project_id = "riddle-diary"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = []
enable_anonymous_sign_ins = true

[auth.email]
enable_confirmations = true
max_frequency = "1m"
otp_length = 8

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[functions.ask-diary]
verify_jwt = true
